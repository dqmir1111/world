<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skwish World</title>
    <style>
        /* === МИНИМАЛИСТИЧНЫЙ ДИЗАЙН === */
        :root {
            --bg-color: #ffffff;
            --surface: #ffffff;
            --border-color: #e5e5e5;
            --text-main: #111111;
            --text-secondary: #666666;
            --accent: #000000;
            --accent-hover: #333333;
            --danger: #d32f2f;
            --radius: 8px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* === НАВИГАЦИЯ И ЛЕЙАУТ === */
        header {
            padding: 24px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 16px 0;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--accent);
        }

        main {
            flex-grow: 1;
            padding: 30px 20px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            align-content: start;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* === КАРТОЧКИ ЗАДАНИЙ === */
        .task-card {
            padding: 24px;
            cursor: pointer;
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
            border-color: #d0d0d0;
        }

        .task-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
        .task-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .task-status { 
            margin-top: 16px; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--text-secondary); 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .task-status::before {
            content: "";
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent);
        }

        .task-img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; margin-top: 16px; border: 1px solid var(--border-color); }

        /* === КНОПКИ === */
        .fab {
            position: fixed;
            bottom: 60px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 28px;
            font-weight: 300;
            border: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fab:hover { background: var(--accent-hover); transform: scale(1.05); }

        .btn {
            padding: 14px 24px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--surface);
            color: var(--text-main);
            width: 100%;
            margin-top: 12px;
            box-sizing: border-box;
        }

        .btn:hover { background: #f9f9f9; border-color: #d0d0d0; }
        
        .btn-primary { background: var(--accent); color: white; border: 1px solid var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        
        .btn-danger { background: var(--surface); color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: #fff5f5; }

        /* === МОДАЛЬНЫЕ ОКНА === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 12px;
            padding: 32px;
            position: relative;
            box-shadow: 0 24px 48px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .modal-content.fullscreen {
            max-width: 100%;
            height: 100vh;
            border-radius: 0;
            padding: 40px 24px;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 24px; right: 24px;
            background: none; border: none;
            font-size: 20px; cursor: pointer; color: var(--text-secondary);
            padding: 8px;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover { color: var(--text-main); }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group textarea {
            width: 100%; box-sizing: border-box; padding: 14px 16px;
            border: 1px solid var(--border-color); border-radius: var(--radius);
            background: var(--surface); font-size: 15px; font-family: inherit;
            transition: border-color 0.2s ease;
            color: var(--text-main);
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none; border-color: var(--accent);
        }
        .input-group textarea { resize: vertical; min-height: 120px; }

        /* === ФУТЕР === */
        footer {
            text-align: center; padding: 20px;
            background: var(--surface); color: var(--text-secondary);
            font-weight: 600; cursor: pointer;
            font-size: 12px; letter-spacing: 1px;
            border-top: 1px solid var(--border-color);
            position: fixed; bottom: 0; width: 100%;
            transition: color 0.2s ease;
        }
        footer:hover { color: var(--text-main); }
        
        /* Загрузка файла */
        input[type="file"] { display: none; }
        .file-upload-label { 
            display: flex; align-items: center; justify-content: center;
            padding: 24px; border: 1px dashed #cccccc; 
            border-radius: var(--radius); cursor: pointer; 
            margin-bottom: 12px; background: #fafafa;
            color: var(--text-secondary); font-size: 14px;
            transition: all 0.2s ease;
        }
        .file-upload-label:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }

        /* Элементы внутри модального окна полноэкранного */
        #tm-title { font-size: 28px; margin: 20px 0 16px; letter-spacing: -0.5px; }
        #tm-desc { font-size: 16px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 30px;}
        .empty-state { color: var(--text-secondary); text-align: center; width: 100%; padding: 40px 0; font-size: 15px; }

    </style>
</head>
<body>

    <header>Skwish World</header>

    <div class="tabs">
        <button class="tab-btn active" onclick="loadTab('available')">Задания</button>
        <button class="tab-btn" onclick="loadTab('progress')">В процессе</button>
        <button class="tab-btn" onclick="loadTab('global')">Завершенные</button>
    </div>

    <main id="main-container"></main>

    <button class="fab" onclick="openAddModal()">+</button>

    <footer onclick="promptAdmin()">SKWISH WORLD</footer>

    <!-- Модальное окно просмотра задания (на весь экран) -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('task-modal')">✕</button>
            <div style="max-width: 600px; margin: 0 auto; position: relative; height: 100%;">
                <h1 id="tm-title">Название</h1>
                <p id="tm-desc"></p>
                
                <div id="tm-photo-area" style="display: none; margin-top: 30px;">
                    <label class="file-upload-label">
                        Прикрепить фото результата
                        <input type="file" id="tm-photo-input" accept="image/*">
                    </label>
                    <p id="tm-photo-name" style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;"></p>
                </div>
                
                <div id="tm-buttons-container" style="margin-top: 40px; padding-bottom: 80px;">
                    <!-- Кнопки будут генерироваться через JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания задания -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('add-modal')">✕</button>
            <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 20px;">Новое задание</h2>
            <div class="input-group">
                <input type="text" id="new-task-title" placeholder="Название задания">
            </div>
            <div class="input-group">
                <textarea id="new-task-desc" placeholder="Подробное описание"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitNewTask()">Отправить на проверку</button>
        </div>
    </div>

    <!-- Админ панель -->
    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('admin-modal')">✕</button>
            <div style="max-width: 800px; margin: 0 auto;">
                <h1 style="margin-top: 20px; margin-bottom: 8px;">Админ панель</h1>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Задания ожидающие проверки</p>
                <div id="admin-container" style="display: grid; gap: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- Подключение Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHdwrLYWdJj4RGlnokF7w6SnjW0cl7-qk",
            authDomain: "skwishworld.firebaseapp.com",
            projectId: "skwishworld",
            storageBucket: "skwishworld.firebasestorage.app",
            messagingSenderId: "703521653990",
            appId: "1:703521653990:web:a92dc5a49af558aa436727",
            measurementId: "G-ZZPK8FRPJ2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myUserId = localStorage.getItem('skwish_uid');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('skwish_uid', myUserId);
        }

        let currentTab = 'available';
        let currentOpenTask = null;

        window.loadTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        };

        window.openAddModal = () => document.getElementById('add-modal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.submitNewTask = async () => {
            const title = document.getElementById('new-task-title').value.trim();
            const desc = document.getElementById('new-task-desc').value.trim();
            if (!title || !desc) return alert('Пожалуйста, заполните все поля.');

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Отправка...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title,
                    description: desc,
                    status: 'pending',
                    authorId: myUserId,
                    timestamp: Date.now()
                });
                document.getElementById('new-task-title').value = '';
                document.getElementById('new-task-desc').value = '';
                closeModal('add-modal');
            } catch (e) {
                console.error(e);
                alert('Ошибка при отправке.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            let statusText = '';
            
            if (task.status === 'in_progress') {
                statusText = '<div class="task-status">Выполняется</div>';
            }
            
            let imgHtml = '';
            if (task.status === 'completed' && task.imageUrl) {
                imgHtml = `<img src="${task.imageUrl}" class="task-img" alt="Фото результата">`;
            }

            div.innerHTML = `
                <div class="task-title">${task.title}</div>
                <div class="task-desc">${task.description}</div>
                ${statusText}
                ${imgHtml}
            `;
            div.onclick = () => openTaskFullscreen(task);
            return div;
        }

        const q = query(collection(db, "tasks"));
        onSnapshot(q, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach(doc => window.allTasks.push({ id: doc.id, ...doc.data() }));
            renderTasks();
            if(document.getElementById('admin-modal').classList.contains('active')) renderAdmin();
        });

        function renderTasks() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            if (!window.allTasks) return;

            let filteredTasks = [];
            if (currentTab === 'available') {
                filteredTasks = window.allTasks.filter(t => t.status === 'approved');
            } else if (currentTab === 'progress') {
                filteredTasks = window.allTasks.filter(t => t.status === 'in_progress' && t.assigneeId === myUserId);
            } else if (currentTab === 'global') {
                filteredTasks = window.allTasks.filter(t => t.status === 'completed');
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет доступных заданий</div>';
                return;
            }
            
            // Сортировка: новые сверху
            filteredTasks.sort((a, b) => b.timestamp - a.timestamp);

            filteredTasks.forEach(task => {
                container.appendChild(createTaskElement(task));
            });
        }

        window.openTaskFullscreen = (task) => {
            currentOpenTask = task;
            document.getElementById('tm-title').innerText = task.title;
            document.getElementById('tm-desc').innerText = task.description;
            
            const btnContainer = document.getElementById('tm-buttons-container');
            const photoArea = document.getElementById('tm-photo-area');
            const photoInput = document.getElementById('tm-photo-input');
            const photoName = document.getElementById('tm-photo-name');
            
            btnContainer.innerHTML = '';
            photoArea.style.display = 'none';
            photoInput.value = '';
            photoName.innerText = '';

            if (task.status === 'approved') {
                btnContainer.innerHTML = `<button class="btn btn-primary" onclick="startTask('${task.id}')">Приступить к выполнению</button>`;
            } else if (task.status === 'in_progress' && task.assigneeId === myUserId) {
                photoArea.style.display = 'block';
                
                photoInput.onchange = (e) => {
                    if(e.target.files.length > 0) {
                        photoName.innerText = e.target.files[0].name;
                    }
                };

                btnContainer.innerHTML = `
                    <button class="btn btn-primary" onclick="finishTask('${task.id}')">Завершить задание</button>
                    <button class="btn btn-danger" onclick="cancelTask('${task.id}')">Отказаться</button>
                `;
            } else if (task.status === 'completed') {
                btnContainer.innerHTML = `<button class="btn" onclick="closeModal('task-modal')">Закрыть</button>`;
            }

            document.getElementById('task-modal').classList.add('active');
        };

        window.startTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'in_progress', assigneeId: myUserId });
            closeModal('task-modal');
        };

        window.cancelTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved', assigneeId: null });
            closeModal('task-modal');
        };

        window.finishTask = async (taskId) => {
            const fileInput = document.getElementById('tm-photo-input');
            const file = fileInput.files[0];
            
            if (!file) return alert('Пожалуйста, прикрепите фото результата работы.');
            
            document.getElementById('tm-buttons-container').innerHTML = '<button class="btn" disabled>Загрузка файла...</button>';

            try {
                const storageReference = ref(storage, 'completed_tasks/' + taskId + '_' + file.name);
                await uploadBytes(storageReference, file);
                const imageUrl = await getDownloadURL(storageReference);

                await updateDoc(doc(db, "tasks", taskId), { 
                    status: 'completed', 
                    imageUrl: imageUrl,
                    completedAt: Date.now()
                });
                closeModal('task-modal');
            } catch (e) {
                console.error(e);
                alert('Ошибка при загрузке фото.');
                closeModal('task-modal');
            }
        };

        window.promptAdmin = () => {
            const pass = prompt("Доступ для администратора:");
            if (pass === "050114") {
                document.getElementById('admin-modal').classList.add('active');
                renderAdmin();
            } else if (pass !== null) {
                alert("Неверный пароль.");
            }
        };

        window.renderAdmin = () => {
            const container = document.getElementById('admin-container');
            container.innerHTML = '';
            const pendingTasks = window.allTasks.filter(t => t.status === 'pending');
            
            if(pendingTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет новых заданий на проверке</div>';
                return;
            }

            pendingTasks.forEach(task => {
                const div = document.createElement('div');
                div.style.border = '1px solid var(--border-color)';
                div.style.padding = '20px';
                div.style.borderRadius = 'var(--radius)';
                div.style.background = '#fafafa';
                
                div.innerHTML = `
                    <h3 style="margin-top:0; font-size:18px;">${task.title}</h3>
                    <p style="font-size:14px; color:var(--text-secondary); line-height:1.5;">${task.description}</p>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button class="btn btn-primary" style="margin:0;" onclick="approveTask('${task.id}')">Одобрить</button>
                        <button class="btn btn-danger" style="margin:0;" onclick="deleteTask('${task.id}')">Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.approveTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved' });
        };
        
        window.deleteTask = async (taskId) => {
            if(confirm('Вы уверены, что хотите удалить это задание?')) {
                await deleteDoc(doc(db, "tasks", taskId));
            }
        };
    </script>
</body>
</html>
