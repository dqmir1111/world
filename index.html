<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Сквишей</title>
    <style>
        /* === БАЗОВЫЕ СТИЛИ И АНИМАЦИИ === */
        :root {
            --primary: #ff7eb3;
            --secondary: #7f7fd5;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2d3436;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект жидкого стекла */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* === НАВИГАЦИЯ И ЛЕЙАУТ === */
        header {
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 0 20px 20px;
            padding: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        main {
            flex-grow: 1;
            padding: 0 20px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            align-content: start;
        }

        /* === КАРТОЧКИ ЗАДАНИЙ === */
        .task-card {
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        .task-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .task-desc { font-size: 14px; opacity: 0.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .task-status { margin-top: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase; color: #fff; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; display: inline-block;}
        .task-img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; margin-top: 10px; }

        /* === КНОПКИ === */
        .fab {
            position: fixed;
            bottom: 70px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            color: var(--primary);
            font-size: 30px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fab:hover { transform: scale(1.1) rotate(90deg); }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.5);
            color: var(--text-dark);
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover { background: rgba(255,255,255,0.8); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #ff5e9c; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ff2a3c; }

        /* === МОДАЛЬНЫЕ ОКНА (НА ВЕСЬ ЭКРАН) === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        .modal-content.fullscreen {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            border-radius: 0;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            font-size: 24px; cursor: pointer; color: var(--text-dark);
        }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group textarea {
            width: 100%; box-sizing: border-box; padding: 15px;
            border: 1px solid var(--glass-border); border-radius: 12px;
            background: rgba(255,255,255,0.5); font-size: 16px; font-family: inherit;
        }
        .input-group textarea { resize: vertical; min-height: 100px; }

        /* === ФУТЕР === */
        footer {
            text-align: center; padding: 15px;
            background: rgba(0,0,0,0.1); color: white;
            font-weight: bold; cursor: pointer;
            transition: 0.3s; font-size: 14px; letter-spacing: 2px;
            position: fixed; bottom: 0; width: 100%; backdrop-filter: blur(5px);
        }
        footer:hover { background: rgba(0,0,0,0.2); }
        
        /* Скрываем инпут для файла */
        input[type="file"] { display: none; }
        .file-upload-label { display: block; text-align: center; padding: 15px; border: 2px dashed rgba(255,255,255,0.8); border-radius: 12px; cursor: pointer; margin-bottom: 10px; background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>

    <header>Мир Сквишей ☁️</header>

    <div class="tabs glass">
        <button class="tab-btn active" onclick="loadTab('available')">Задания</button>
        <button class="tab-btn" onclick="loadTab('progress')">В процессе</button>
        <button class="tab-btn" onclick="loadTab('global')">Global Completed</button>
    </div>

    <main id="main-container"></main>

    <button class="fab" onclick="openAddModal()">+</button>

    <footer onclick="promptAdmin()">SKWISH WORLD</footer>

    <div class="modal-overlay" id="task-modal">
        <div class="modal-content fullscreen glass">
            <button class="close-btn" onclick="closeModal('task-modal')">✖</button>
            <h1 id="tm-title" style="margin-top: 40px;">Название</h1>
            <p id="tm-desc" style="font-size: 18px; line-height: 1.6;"></p>
            <div id="tm-photo-area" style="display: none;">
                <label class="file-upload-label">
                    📸 Прикрепить фото
                    <input type="file" id="tm-photo-input" accept="image/*">
                </label>
                <p id="tm-photo-name" style="text-align: center; font-size: 12px;"></p>
            </div>
            <div id="tm-buttons-container" style="position: absolute; bottom: 40px; width: calc(100% - 60px);">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeModal('add-modal')">✖</button>
            <h2>Новое задание</h2>
            <div class="input-group">
                <input type="text" id="new-task-title" placeholder="Название задания">
            </div>
            <div class="input-group">
                <textarea id="new-task-desc" placeholder="Описание задания"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitNewTask()">Отправить на проверку</button>
        </div>
    </div>

    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content fullscreen glass">
            <button class="close-btn" onclick="closeModal('admin-modal')">✖</button>
            <h1 style="margin-top: 40px; color: #ff4757;">Админ Панель</h1>
            <p>Задания на проверке:</p>
            <div id="admin-container" style="display: grid; gap: 15px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHdwrLYWdJj4RGlnokF7w6SnjW0cl7-qk",
            authDomain: "skwishworld.firebaseapp.com",
            projectId: "skwishworld",
            storageBucket: "skwishworld.firebasestorage.app",
            messagingSenderId: "703521653990",
            appId: "1:703521653990:web:a92dc5a49af558aa436727",
            measurementId: "G-ZZPK8FRPJ2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Генерация ID пользователя для отслеживания "своих" заданий
        let myUserId = localStorage.getItem('skwish_uid');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('skwish_uid', myUserId);
        }

        let currentTab = 'available';
        let currentOpenTask = null;

        // Глобальные функции для HTML обработчиков
        window.loadTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        };

        window.openAddModal = () => document.getElementById('add-modal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        // Отправка нового задания (падает в pending для админки)
        window.submitNewTask = async () => {
            const title = document.getElementById('new-task-title').value;
            const desc = document.getElementById('new-task-desc').value;
            if (!title || !desc) return alert('Заполните все поля!');

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title,
                    description: desc,
                    status: 'pending', // Ждет проверки админа
                    authorId: myUserId,
                    timestamp: Date.now()
                });
                document.getElementById('new-task-title').value = '';
                document.getElementById('new-task-desc').value = '';
                closeModal('add-modal');
                alert('Задание отправлено на проверку!');
            } catch (e) {
                console.error(e);
                alert('Ошибка при отправке');
            }
        };

        // Рендер карточек
        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card glass';
            let statusText = '';
            if (task.status === 'in_progress') statusText = '<div class="task-status">⏳ Идет выполнение</div>';
            
            let imgHtml = '';
            if (task.status === 'completed' && task.imageUrl) {
                imgHtml = `<img src="${task.imageUrl}" class="task-img" alt="Фото задания">`;
            }

            div.innerHTML = `
                <div class="task-title">${task.title}</div>
                <div class="task-desc">${task.description}</div>
                ${statusText}
                ${imgHtml}
            `;
            div.onclick = () => openTaskFullscreen(task);
            return div;
        }

        // Подписка на обновления БД в реальном времени
        const q = query(collection(db, "tasks"));
        onSnapshot(q, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach(doc => window.allTasks.push({ id: doc.id, ...doc.data() }));
            renderTasks();
            if(document.getElementById('admin-modal').classList.contains('active')) renderAdmin();
        });

        function renderTasks() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            if (!window.allTasks) return;

            let filteredTasks = [];
            if (currentTab === 'available') {
                filteredTasks = window.allTasks.filter(t => t.status === 'approved');
            } else if (currentTab === 'progress') {
                filteredTasks = window.allTasks.filter(t => t.status === 'in_progress' && t.assigneeId === myUserId);
            } else if (currentTab === 'global') {
                filteredTasks = window.allTasks.filter(t => t.status === 'completed');
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = '<p style="color:white; text-align:center; width:100%;">Пока здесь пусто 🍃</p>';
            }
            
            filteredTasks.forEach(task => {
                container.appendChild(createTaskElement(task));
            });
        }

        // Открытие задания на весь экран
        window.openTaskFullscreen = (task) => {
            currentOpenTask = task;
            document.getElementById('tm-title').innerText = task.title;
            document.getElementById('tm-desc').innerText = task.description;
            
            const btnContainer = document.getElementById('tm-buttons-container');
            const photoArea = document.getElementById('tm-photo-area');
            const photoInput = document.getElementById('tm-photo-input');
            const photoName = document.getElementById('tm-photo-name');
            
            btnContainer.innerHTML = '';
            photoArea.style.display = 'none';
            photoInput.value = '';
            photoName.innerText = '';

            if (task.status === 'approved') {
                btnContainer.innerHTML = `<button class="btn btn-primary" onclick="startTask('${task.id}')">Приступить</button>`;
            } else if (task.status === 'in_progress' && task.assigneeId === myUserId) {
                photoArea.style.display = 'block';
                
                photoInput.onchange = (e) => {
                    if(e.target.files.length > 0) photoName.innerText = 'Выбрано: ' + e.target.files[0].name;
                };

                btnContainer.innerHTML = `
                    <button class="btn btn-primary" onclick="finishTask('${task.id}')">Завершить</button>
                    <button class="btn btn-danger" onclick="cancelTask('${task.id}')">Отказаться</button>
                `;
            } else if (task.status === 'completed') {
                btnContainer.innerHTML = `<button class="btn" onclick="closeModal('task-modal')">Назад</button>`;
            }

            document.getElementById('task-modal').classList.add('active');
        };

        // Логика кнопок внутри задания
        window.startTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'in_progress', assigneeId: myUserId });
            closeModal('task-modal');
        };

        window.cancelTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved', assigneeId: null });
            closeModal('task-modal');
        };

        window.finishTask = async (taskId) => {
            const fileInput = document.getElementById('tm-photo-input');
            const file = fileInput.files[0];
            
            if (!file) return alert('Пожалуйста, прикрепите фото выполнения!');
            
            document.getElementById('tm-buttons-container').innerHTML = '<button class="btn">Загрузка фото...</button>';

            try {
                const storageReference = ref(storage, 'completed_tasks/' + taskId + '_' + file.name);
                await uploadBytes(storageReference, file);
                const imageUrl = await getDownloadURL(storageReference);

                await updateDoc(doc(db, "tasks", taskId), { 
                    status: 'completed', 
                    imageUrl: imageUrl,
                    completedAt: Date.now()
                });
                closeModal('task-modal');
                alert('Задание успешно завершено!');
            } catch (e) {
                console.error(e);
                alert('Ошибка при загрузке фото');
                closeModal('task-modal');
            }
        };

        // === АДМИН ПАНЕЛЬ ===
        window.promptAdmin = () => {
            const pass = prompt("Введите пароль доступа:");
            if (pass === "050114") {
                document.getElementById('admin-modal').classList.add('active');
                renderAdmin();
            } else if (pass !== null) {
                alert("Неверный пароль!");
            }
        };

        window.renderAdmin = () => {
            const container = document.getElementById('admin-container');
            container.innerHTML = '';
            const pendingTasks = window.allTasks.filter(t => t.status === 'pending');
            
            if(pendingTasks.length === 0) {
                container.innerHTML = '<p>Нет заданий на проверке</p>';
                return;
            }

            pendingTasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'glass';
                div.style.padding = '15px';
                div.innerHTML = `
                    <h3>${task.title}</h3>
                    <p>${task.description}</p>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-primary" onclick="approveTask('${task.id}')">Одобрить</button>
                        <button class="btn btn-danger" onclick="deleteTask('${task.id}')">Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.approveTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved' });
        };
        
        window.deleteTask = async (taskId) => {
            if(confirm('Точно удалить?')) {
                await deleteDoc(doc(db, "tasks", taskId));
            }
        };
    </script>
</body>
</html>
