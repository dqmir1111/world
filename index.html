<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skwish World</title>
    <style>
        /* === ДИЗАЙН В СТИЛЕ PLAYEROK === */
        :root {
            --bg-color: #121212; /* Глубокий темный фон */
            --surface: #1e1e1e; /* Цвет карточек */
            --surface-hover: #252525;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #20D865; /* Фирменный зеленый */
            --accent-hover: #1cb555;
            --danger: #ff4747;
            --radius: 20px;
            --btn-radius: 14px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* === НАВИГАЦИЯ === */
        header {
            padding: 24px 20px 16px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--bg-color);
        }

        .tabs {
            display: flex;
            gap: 12px;
            padding: 0 20px 16px;
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 100px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { color: var(--text-main); background: var(--surface-hover); }
        .tab-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        main {
            flex-grow: 1;
            padding: 24px 20px 120px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            align-content: start;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* === КАРТОЧКИ ЗАДАНИЙ === */
        .task-card {
            padding: 20px;
            cursor: pointer;
            background: var(--surface);
            border-radius: var(--radius);
            transition: transform 0.2s ease, background 0.2s ease;
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-2px);
            background: var(--surface-hover);
        }

        .task-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .task-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .task-status { 
            margin-top: 16px; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--accent); 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(32, 216, 101, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .task-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-top: 16px; }

        /* === КНОПКИ === */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            font-size: 32px;
            font-weight: 400;
            border: none;
            box-shadow: 0 8px 24px rgba(32, 216, 101, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fab:hover { background: var(--accent-hover); transform: scale(1.05); }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--surface);
            color: var(--text-main);
            width: 100%;
            margin-top: 12px;
            box-sizing: border-box;
        }

        .btn:hover { background: var(--surface-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); }
        
        .btn-danger { background: rgba(255, 71, 71, 0.1); color: var(--danger); }
        .btn-danger:hover { background: rgba(255, 71, 71, 0.2); }

        /* === МОДАЛЬНЫЕ ОКНА === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            width: 100%;
            max-width: 480px;
            background: var(--bg-color);
            border-radius: 24px;
            padding: 32px 24px;
            position: relative;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .modal-content.fullscreen {
            max-width: 100%;
            height: 100vh;
            border-radius: 0;
            padding: 40px 20px;
            overflow-y: auto;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--surface); border: none;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 18px; cursor: pointer; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .close-btn:hover { background: var(--surface-hover); color: var(--text-main); }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group textarea {
            width: 100%; box-sizing: border-box; padding: 16px;
            border: 1px solid var(--border-color); border-radius: var(--btn-radius);
            background: var(--surface); font-size: 16px; font-family: inherit;
            color: var(--text-main);
            transition: border-color 0.2s ease;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none; border-color: var(--accent);
        }
        .input-group textarea { resize: vertical; min-height: 120px; }

        /* === ФУТЕР === */
        footer {
            text-align: center; padding: 20px;
            background: var(--bg-color); color: var(--text-secondary);
            font-weight: 700; cursor: pointer;
            font-size: 13px; letter-spacing: 1px;
            border-top: 1px solid var(--border-color);
            position: fixed; bottom: 0; width: 100%;
            transition: color 0.2s ease;
        }
        footer:hover { color: var(--text-main); }
        
        /* Загрузка файла */
        input[type="file"] { display: none; }
        .file-upload-label { 
            display: flex; align-items: center; justify-content: center;
            padding: 24px; border: 2px dashed var(--border-color); 
            border-radius: var(--btn-radius); cursor: pointer; 
            margin-bottom: 12px; background: var(--surface);
            color: var(--text-main); font-size: 15px; font-weight: 600;
            transition: all 0.2s ease;
        }
        .file-upload-label:hover { border-color: var(--accent); color: var(--accent); }

        #tm-title { font-size: 28px; margin: 20px 0 16px; font-weight: 800; }
        #tm-desc { font-size: 16px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 30px;}
        .empty-state { color: var(--text-secondary); text-align: center; width: 100%; padding: 40px 0; font-size: 16px; font-weight: 600; }

    </style>
</head>
<body>

    <header>Skwish World</header>

    <div class="tabs">
        <button class="tab-btn active" onclick="loadTab('available')">Доступные</button>
        <button class="tab-btn" onclick="loadTab('progress')">В процессе</button>
        <button class="tab-btn" onclick="loadTab('global')">Завершенные</button>
    </div>

    <main id="main-container"></main>

    <button class="fab" onclick="openAddModal()">+</button>

    <footer onclick="promptAdmin()">SKWISH WORLD</footer>

    <div class="modal-overlay" id="task-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('task-modal')">✕</button>
            <div style="max-width: 600px; margin: 0 auto; position: relative; height: 100%;">
                <h1 id="tm-title">Название</h1>
                <p id="tm-desc"></p>
                
                <div id="tm-photo-area" style="display: none; margin-top: 30px;">
                    <label class="file-upload-label">
                        + Загрузить скриншот
                        <input type="file" id="tm-photo-input" accept="image/*">
                    </label>
                    <p id="tm-photo-name" style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;"></p>
                </div>
                
                <div id="tm-buttons-container" style="margin-top: 40px; padding-bottom: 80px;">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('add-modal')">✕</button>
            <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 24px; font-weight: 800;">Новое задание</h2>
            <div class="input-group">
                <input type="text" id="new-task-title" placeholder="Название">
            </div>
            <div class="input-group">
                <textarea id="new-task-desc" placeholder="Описание задания"></textarea>
            </div>
            <button class="btn btn-primary" id="submit-task-btn" onclick="submitNewTask()">Отправить на проверку</button>
        </div>
    </div>

    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('admin-modal')">✕</button>
            <div style="max-width: 800px; margin: 0 auto;">
                <h1 style="margin-top: 20px; margin-bottom: 8px;">Админка</h1>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Ожидают проверки</p>
                <div id="admin-container" style="display: grid; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // !!! ВСТАВЬ СЮДА СВОЙ КОНФИГ ИЗ НАСТРОЕК ПРОЕКТА FIREBASE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAHdwrLYWdJj4RGlnokF7w6SnjW0cl7-qk",
            authDomain: "skwishworld.firebaseapp.com",
            projectId: "skwishworld",
            storageBucket: "skwishworld.firebasestorage.app",
            messagingSenderId: "703521653990",
            appId: "1:703521653990:web:a92dc5a49af558aa436727"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myUserId = localStorage.getItem('skwish_uid');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('skwish_uid', myUserId);
        }

        let currentTab = 'available';
        let currentOpenTask = null;

        window.loadTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        };

        window.openAddModal = () => document.getElementById('add-modal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        // ИСПРАВЛЕНО: Безопасная отправка
        window.submitNewTask = async () => {
            const titleInput = document.getElementById('new-task-title');
            const descInput = document.getElementById('new-task-desc');
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();
            
            if (!title || !desc) return alert('Пожалуйста, заполните все поля.');

            const btn = document.getElementById('submit-task-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Отправка...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title,
                    description: desc,
                    status: 'pending',
                    authorId: myUserId,
                    timestamp: Date.now()
                });
                titleInput.value = '';
                descInput.value = '';
                closeModal('add-modal');
            } catch (e) {
                console.error("Ошибка Firebase:", e);
                alert('Ошибка! Проверь правила Firestore Rules (нужно allow read, write: if true;)');
            } finally {
                // Кнопка отвисает в любом случае
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            let statusText = '';
            
            if (task.status === 'in_progress') {
                statusText = '<div class="task-status">⏳ В процессе</div>';
            } else if (task.status === 'completed') {
                statusText = '<div class="task-status" style="color:var(--text-main); background:var(--surface-hover);">✓ Выполнено</div>';
            }
            
            let imgHtml = '';
            if (task.status === 'completed' && task.imageUrl) {
                imgHtml = `<img src="${task.imageUrl}" class="task-img">`;
            }

            div.innerHTML = `
                <div class="task-title">${task.title}</div>
                <div class="task-desc">${task.description}</div>
                ${statusText}
                ${imgHtml}
            `;
            div.onclick = () => openTaskFullscreen(task);
            return div;
        }

        const q = query(collection(db, "tasks"));
        onSnapshot(q, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach(doc => window.allTasks.push({ id: doc.id, ...doc.data() }));
            renderTasks();
            if(document.getElementById('admin-modal').classList.contains('active')) renderAdmin();
        });

        function renderTasks() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            if (!window.allTasks) return;

            let filteredTasks = [];
            if (currentTab === 'available') {
                filteredTasks = window.allTasks.filter(t => t.status === 'approved');
            } else if (currentTab === 'progress') {
                filteredTasks = window.allTasks.filter(t => t.status === 'in_progress' && t.assigneeId === myUserId);
            } else if (currentTab === 'global') {
                filteredTasks = window.allTasks.filter(t => t.status === 'completed');
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Пусто</div>';
                return;
            }
            
            filteredTasks.sort((a, b) => b.timestamp - a.timestamp);
            filteredTasks.forEach(task => container.appendChild(createTaskElement(task)));
        }

        window.openTaskFullscreen = (task) => {
            currentOpenTask = task;
            document.getElementById('tm-title').innerText = task.title;
            document.getElementById('tm-desc').innerText = task.description;
            
            const btnContainer = document.getElementById('tm-buttons-container');
            const photoArea = document.getElementById('tm-photo-area');
            const photoInput = document.getElementById('tm-photo-input');
            const photoName = document.getElementById('tm-photo-name');
            
            btnContainer.innerHTML = '';
            photoArea.style.display = 'none';
            photoInput.value = '';
            photoName.innerText = '';

            if (task.status === 'approved') {
                btnContainer.innerHTML = `<button class="btn btn-primary" onclick="startTask('${task.id}')">Приступить</button>`;
            } else if (task.status === 'in_progress' && task.assigneeId === myUserId) {
                photoArea.style.display = 'block';
                
                photoInput.onchange = (e) => {
                    if(e.target.files.length > 0) {
                        photoName.innerText = e.target.files[0].name;
                    }
                };

                btnContainer.innerHTML = `
                    <button class="btn btn-primary" id="finish-btn" onclick="finishTask('${task.id}')">Завершить</button>
                    <button class="btn btn-danger" onclick="cancelTask('${task.id}')">Отказаться</button>
                `;
            } else if (task.status === 'completed') {
                btnContainer.innerHTML = `<button class="btn" onclick="closeModal('task-modal')">Назад</button>`;
            }

            document.getElementById('task-modal').classList.add('active');
        };

        window.startTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'in_progress', assigneeId: myUserId });
            closeModal('task-modal');
        };

        window.cancelTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved', assigneeId: null });
            closeModal('task-modal');
        };

        window.finishTask = async (taskId) => {
            const fileInput = document.getElementById('tm-photo-input');
            const file = fileInput.files[0];
            
            if (!file) return alert('Прикрепи скриншот!');
            
            const btn = document.getElementById('finish-btn');
            btn.innerText = 'Загрузка...';
            btn.disabled = true;

            try {
                const storageReference = ref(storage, 'completed_tasks/' + taskId + '_' + file.name);
                await uploadBytes(storageReference, file);
                const imageUrl = await getDownloadURL(storageReference);

                await updateDoc(doc(db, "tasks", taskId), { 
                    status: 'completed', 
                    imageUrl: imageUrl,
                    completedAt: Date.now()
                });
                closeModal('task-modal');
            } catch (e) {
                console.error(e);
                alert('Ошибка при загрузке. Проверь правила Storage!');
                btn.innerText = 'Завершить';
                btn.disabled = false;
            }
        };

        window.promptAdmin = () => {
            const pass = prompt("Пароль админа:");
            if (pass === "050114") {
                document.getElementById('admin-modal').classList.add('active');
                renderAdmin();
            } else if (pass !== null) {
                alert("Неверно");
            }
        };

        window.renderAdmin = () => {
            const container = document.getElementById('admin-container');
            container.innerHTML = '';
            const pendingTasks = window.allTasks.filter(t => t.status === 'pending');
            
            if(pendingTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет заданий</div>';
                return;
            }

            pendingTasks.forEach(task => {
                const div = document.createElement('div');
                div.style.background = 'var(--surface)';
                div.style.padding = '20px';
                div.style.borderRadius = 'var(--radius)';
                
                div.innerHTML = `
                    <h3 style="margin-top:0;">${task.title}</h3>
                    <p style="color:var(--text-secondary);">${task.description}</p>
                    <div style="display:flex; gap:12px; margin-top:16px;">
                        <button class="btn btn-primary" style="margin:0;" onclick="approveTask('${task.id}')">Одобрить</button>
                        <button class="btn btn-danger" style="margin:0;" onclick="deleteTask('${task.id}')">Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.approveTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved' });
        };
        
        window.deleteTask = async (taskId) => {
            if(confirm('Удалить?')) await deleteDoc(doc(db, "tasks", taskId));
        };
    </script>
</body>
</html>
