<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skwish World</title>
    <style>
        /* === ДИЗАЙН PLAYEROK === */
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --surface-hover: #252525;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #20D865;
            --accent-hover: #1cb555;
            --danger: #ff4747;
            --radius: 20px;
            --btn-radius: 14px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* === НАВИГАЦИЯ === */
        header {
            padding: 24px 20px 8px;
            text-align: center;
        }
        
        .header-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        .header-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-weight: 500; }

        .tabs {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 100px;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover { color: var(--text-main); background: var(--surface-hover); }
        .tab-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        main {
            flex-grow: 1;
            padding: 24px 20px 120px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            align-content: start;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* === КАРТОЧКИ ЗАДАНИЙ === */
        .task-card {
            padding: 20px;
            cursor: pointer;
            background: var(--surface);
            border-radius: var(--radius);
            transition: transform 0.2s ease, background 0.2s ease;
            border: 1px solid transparent;
        }

        .task-card:hover {
            transform: translateY(-2px);
            background: var(--surface-hover);
            border-color: var(--border-color);
        }

        .task-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; display: block;}
        .task-title { font-size: 20px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; }
        .task-desc { font-size: 15px; color: #d0d0d0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 16px;}
        .task-date { font-size: 12px; color: var(--text-secondary); margin-top: 12px; }
        
        .task-status { 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--accent); 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(32, 216, 101, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .task-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-top: 16px; border: 1px solid var(--border-color); }

        /* === КНОПКИ === */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            font-size: 32px;
            font-weight: 400;
            border: none;
            box-shadow: 0 8px 24px rgba(32, 216, 101, 0.25);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
        }

        .fab:hover { background: var(--accent-hover); transform: scale(1.05); }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--surface);
            color: var(--text-main);
            width: 100%;
            margin-top: 12px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { background: #2c2c2c; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); }
        
        .btn-danger { background: rgba(255, 71, 71, 0.1); color: var(--danger); }
        .btn-danger:hover { background: rgba(255, 71, 71, 0.2); }

        /* === УВЕДОМЛЕНИЯ (TOASTS) === */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .toast-text { font-size: 14px; font-weight: 600; line-height: 1.4; }
        .toast-action {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        /* === МОДАЛЬНЫЕ ОКНА === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            width: 100%;
            max-width: 480px;
            background: var(--bg-color);
            border-radius: 24px;
            padding: 32px 24px;
            position: relative;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .modal-content.fullscreen {
            max-width: 100%;
            height: 100vh;
            border-radius: 0;
            padding: 40px 20px;
            overflow-y: auto;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--surface); border: none;
            width: 44px; height: 44px; border-radius: 50%;
            font-size: 18px; cursor: pointer; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .close-btn:hover { background: var(--surface-hover); color: var(--text-main); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; padding-left: 4px; }
        .input-group input, .input-group textarea {
            width: 100%; box-sizing: border-box; padding: 16px;
            border: 1px solid var(--border-color); border-radius: var(--btn-radius);
            background: var(--surface); font-size: 16px; font-family: inherit;
            color: var(--text-main);
            transition: border-color 0.2s ease;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none; border-color: var(--accent);
        }
        .input-group textarea { resize: vertical; min-height: 140px; }

        /* === ФУТЕР === */
        footer {
            text-align: center; padding: 20px;
            background: var(--bg-color); color: var(--text-secondary);
            font-weight: 700; cursor: pointer;
            font-size: 13px; letter-spacing: 1px;
            border-top: 1px solid var(--border-color);
            position: fixed; bottom: 0; width: 100%;
            transition: color 0.2s ease;
            z-index: 80;
        }
        footer:hover { color: var(--text-main); }
        
        /* Загрузка файла */
        input[type="file"] { display: none; }
        .file-upload-label { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            padding: 32px 20px; border: 2px dashed var(--border-color); 
            border-radius: var(--btn-radius); cursor: pointer; 
            margin-bottom: 12px; background: var(--surface);
            color: var(--text-main); font-size: 16px; font-weight: 700;
            transition: all 0.2s ease;
        }
        .file-upload-label span.sub { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .file-upload-label:hover { border-color: var(--accent); background: rgba(32, 216, 101, 0.05); }

        #tm-title { font-size: 32px; margin: 20px 0 16px; font-weight: 800; line-height: 1.1; }
        #tm-desc { font-size: 16px; color: #d0d0d0; line-height: 1.6; margin-bottom: 30px; background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color);}
        .empty-state { color: var(--text-secondary); text-align: center; width: 100%; padding: 60px 0; font-size: 16px; font-weight: 600; background: var(--surface); border-radius: 20px; border: 1px dashed var(--border-color); }

    </style>
</head>
<body>

    <header>
        <h1 class="header-title">Skwish World</h1>
        <div class="header-subtitle">Платформа выполнения заданий</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="loadTab('available')">📌 Доступные</button>
        <button class="tab-btn" onclick="loadTab('progress')">⏳ В процессе</button>
        <button class="tab-btn" onclick="loadTab('global')">🏆 Завершенные</button>
    </div>

    <main id="main-container"></main>

    <button class="fab" onclick="openAddModal()">+</button>

    <footer onclick="promptAdmin()">⚡ ПАНЕЛЬ АДМИНИСТРАТОРА</footer>

    <div id="toast-container"></div>

    <div class="modal-overlay" id="task-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('task-modal')">✕</button>
            <div style="max-width: 600px; margin: 0 auto; position: relative; height: 100%; padding-bottom: 100px;">
                <span class="task-label" id="tm-label">Детали задания</span>
                <h1 id="tm-title">Название</h1>
                <p id="tm-desc"></p>
                
                <div id="tm-photo-area" style="display: none; margin-top: 30px;">
                    <label class="file-upload-label">
                        📸 Выбрать скриншот
                        <span class="sub">Нажмите сюда, чтобы загрузить доказательство</span>
                        <input type="file" id="tm-photo-input" accept="image/*">
                    </label>
                    <p id="tm-photo-name" style="text-align: center; font-size: 14px; color: var(--accent); font-weight: 600; margin-bottom: 20px;"></p>
                </div>
                
                <div id="tm-buttons-container" style="margin-top: 40px;">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('add-modal')">✕</button>
            <h2 style="margin-top: 0; margin-bottom: 8px; font-size: 24px; font-weight: 800;">Создать задание</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">Заполните данные. Задание появится в списке после проверки модератором.</p>
            
            <div class="input-group">
                <label>Название задания</label>
                <input type="text" id="new-task-title" placeholder="Например: трейд">
            </div>
            <div class="input-group">
                <label>Подробное описание</label>
                <textarea id="new-task-desc" placeholder="Расскажите пошагово, что нужно сделать исполнителю..."></textarea>
            </div>
            <button class="btn btn-primary" id="submit-task-btn" onclick="submitNewTask()">Отправить на модерацию</button>
        </div>
    </div>

    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content fullscreen">
            <button class="close-btn" onclick="closeModal('admin-modal')">✕</button>
            <div style="max-width: 800px; margin: 0 auto;">
                <h1 style="margin-top: 20px; margin-bottom: 8px;">Админка</h1>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Новые задания, ожидающие вашей проверки</p>
                <div id="admin-container" style="display: grid; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Storage УДАЛЕН. Оставлен только Firestore.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // ВСТАВЬ СЮДА СВОЙ КОНФИГ ИЗ НАСТРОЕК ПРОЕКТА FIREBASE 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAHdwrLYWdJj4RGlnokF7w6SnjW0cl7-qk",
            authDomain: "skwishworld.firebaseapp.com",
            projectId: "skwishworld",
            messagingSenderId: "703521653990",
            appId: "1:703521653990:web:a92dc5a49af558aa436727"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myUserId = localStorage.getItem('skwish_uid');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('skwish_uid', myUserId);
        }

        let currentTab = 'available';

        // --- СИСТЕМА УВЕДОМЛЕНИЙ ---
        window.showNotification = (text, actionText = null, tabToLoad = null) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let innerHTML = `<div class="toast-text">${text}</div>`;
            if (actionText && tabToLoad) {
                innerHTML += `<button class="toast-action" onclick="loadTab('${tabToLoad}'); this.parentElement.remove();">${actionText}</button>`;
            }
            toast.innerHTML = innerHTML;
            container.appendChild(toast);
            
            // Удаляем тост через 5 секунд
            setTimeout(() => {
                if(toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);
        };

        window.loadTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Подсветка нужной кнопки
            if(tab === 'available') document.querySelectorAll('.tab-btn')[0].classList.add('active');
            if(tab === 'progress') document.querySelectorAll('.tab-btn')[1].classList.add('active');
            if(tab === 'global') document.querySelectorAll('.tab-btn')[2].classList.add('active');
            
            closeModal('task-modal'); // Закрываем задание, если было открыто
            renderTasks();
        };

        window.openAddModal = () => document.getElementById('add-modal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.submitNewTask = async () => {
            const titleInput = document.getElementById('new-task-title');
            const descInput = document.getElementById('new-task-desc');
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();
            
            if (!title || !desc) return showNotification('❌ Заполните все поля!');

            const btn = document.getElementById('submit-task-btn');
            btn.innerText = 'Отправка...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title,
                    description: desc,
                    status: 'pending',
                    authorId: myUserId,
                    timestamp: Date.now()
                });
                titleInput.value = '';
                descInput.value = '';
                closeModal('add-modal');
                showNotification('✅ Задание отправлено на модерацию!');
            } catch (e) {
                console.error(e);
                showNotification('❌ Ошибка отправки в БД');
            } finally {
                btn.innerText = 'Отправить на модерацию';
                btn.disabled = false;
            }
        };

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            
            let statusText = '';
            if (task.status === 'in_progress') {
                statusText = '<div class="task-status">⏳ Выполняется</div>';
            } else if (task.status === 'completed') {
                statusText = '<div class="task-status" style="color:var(--bg-color); background:var(--text-main);">🏆 Выполнено</div>';
            }
            
            let imgHtml = '';
            // Если есть base64 картинка (imageUrl) - показываем её
            if (task.status === 'completed' && task.imageUrl) {
                imgHtml = `<img src="${task.imageUrl}" class="task-img">`;
            }

            const dateStr = new Date(task.timestamp).toLocaleString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'});

            div.innerHTML = `
                <span class="task-label">📋 Задание</span>
                <div class="task-title">${task.title}</div>
                <div class="task-desc">${task.description}</div>
                ${statusText}
                ${imgHtml}
                <div class="task-date">Создано: ${dateStr}</div>
            `;
            div.onclick = () => openTaskFullscreen(task);
            return div;
        }

        const q = query(collection(db, "tasks"));
        onSnapshot(q, (snapshot) => {
            window.allTasks = [];
            snapshot.forEach(doc => window.allTasks.push({ id: doc.id, ...doc.data() }));
            renderTasks();
            if(document.getElementById('admin-modal').classList.contains('active')) renderAdmin();
        });

        function renderTasks() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            if (!window.allTasks) return;

            let filteredTasks = [];
            if (currentTab === 'available') {
                filteredTasks = window.allTasks.filter(t => t.status === 'approved');
            } else if (currentTab === 'progress') {
                filteredTasks = window.allTasks.filter(t => t.status === 'in_progress' && t.assigneeId === myUserId);
            } else if (currentTab === 'global') {
                filteredTasks = window.allTasks.filter(t => t.status === 'completed');
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Пока что здесь пусто 🍃</div>';
                return;
            }
            
            filteredTasks.sort((a, b) => b.timestamp - a.timestamp);
            filteredTasks.forEach(task => container.appendChild(createTaskElement(task)));
        }

        window.openTaskFullscreen = (task) => {
            document.getElementById('tm-title').innerText = task.title;
            document.getElementById('tm-desc').innerText = task.description;
            
            const btnContainer = document.getElementById('tm-buttons-container');
            const photoArea = document.getElementById('tm-photo-area');
            const photoInput = document.getElementById('tm-photo-input');
            const photoName = document.getElementById('tm-photo-name');
            
            btnContainer.innerHTML = '';
            photoArea.style.display = 'none';
            photoInput.value = '';
            photoName.innerText = '';

            if (task.status === 'approved') {
                btnContainer.innerHTML = `<button class="btn btn-primary" onclick="startTask('${task.id}')">🚀 Приступить к выполнению</button>`;
            } else if (task.status === 'in_progress' && task.assigneeId === myUserId) {
                photoArea.style.display = 'block';
                
                photoInput.onchange = (e) => {
                    if(e.target.files.length > 0) {
                        photoName.innerText = "Файл готов: " + e.target.files[0].name;
                    }
                };

                btnContainer.innerHTML = `
                    <button class="btn btn-primary" id="finish-btn" onclick="finishTask('${task.id}')">✅ Завершить и отправить отчёт</button>
                    <button class="btn btn-danger" onclick="cancelTask('${task.id}')">❌ Отказаться от задания</button>
                `;
            } else if (task.status === 'completed') {
                btnContainer.innerHTML = `<button class="btn" onclick="closeModal('task-modal')">⬅ Вернуться назад</button>`;
            }

            document.getElementById('task-modal').classList.add('active');
        };

        window.startTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'in_progress', assigneeId: myUserId });
            closeModal('task-modal');
            showNotification('Задание успешно взято в работу!', 'Открыть', 'progress');
        };

        window.cancelTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved', assigneeId: null });
            closeModal('task-modal');
            showNotification('Вы отказались от задания. Оно снова доступно.', 'Посмотреть', 'available');
        };

        // --- ФУНКЦИЯ СЖАТИЯ И КОНВЕРТАЦИИ В BASE64 ---
        function compressToBase64(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Сжимаем до 800px по ширине
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Конвертируем в JPEG с качеством 70% (сильно экономит место для базы)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    callback(dataUrl);
                }
            }
        }

        window.finishTask = async (taskId) => {
            const fileInput = document.getElementById('tm-photo-input');
            const file = fileInput.files[0];
            
            if (!file) {
                showNotification('❌ Обязательно прикрепите скриншот!');
                return;
            }
            
            const btn = document.getElementById('finish-btn');
            btn.innerText = '⏳ Обработка фото и сохранение...';
            btn.disabled = true;

            // Сжимаем фото и получаем Base64
            compressToBase64(file, async (base64String) => {
                try {
                    await updateDoc(doc(db, "tasks", taskId), { 
                        status: 'completed', 
                        imageUrl: base64String, // Сохраняем строку прямо в БД
                        completedAt: Date.now()
                    });
                    closeModal('task-modal');
                    showNotification('🎉 Задание успешно завершено!', 'В завершенные', 'global');
                } catch (e) {
                    console.error(e);
                    showNotification('❌ Ошибка! Возможно фото слишком большое.');
                    btn.innerText = '✅ Завершить и отправить отчёт';
                    btn.disabled = false;
                }
            });
        };

        window.promptAdmin = () => {
            const pass = prompt("Введите пароль:");
            if (pass === "050114") {
                document.getElementById('admin-modal').classList.add('active');
                renderAdmin();
            } else if (pass !== null) {
                showNotification('❌ Неверный пароль');
            }
        };

        window.renderAdmin = () => {
            const container = document.getElementById('admin-container');
            container.innerHTML = '';
            const pendingTasks = window.allTasks.filter(t => t.status === 'pending');
            
            if(pendingTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет заданий, ожидающих проверки</div>';
                return;
            }

            pendingTasks.forEach(task => {
                const div = document.createElement('div');
                div.style.background = 'var(--surface)';
                div.style.padding = '20px';
                div.style.borderRadius = 'var(--radius)';
                div.style.border = '1px solid var(--border-color)';
                
                div.innerHTML = `
                    <span class="task-label">Модерация</span>
                    <h3 style="margin-top:8px; margin-bottom:8px;">${task.title}</h3>
                    <p style="color:var(--text-secondary); margin-top:0; font-size:14px;">${task.description}</p>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button class="btn btn-primary" style="margin:0; width:auto;" onclick="approveTask('${task.id}')">✅ Одобрить</button>
                        <button class="btn btn-danger" style="margin:0; width:auto;" onclick="deleteTask('${task.id}')">🗑 Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.approveTask = async (taskId) => {
            await updateDoc(doc(db, "tasks", taskId), { status: 'approved' });
            showNotification('✅ Задание одобрено!');
        };
        
        window.deleteTask = async (taskId) => {
            if(confirm('Точно удалить навсегда?')) {
                await deleteDoc(doc(db, "tasks", taskId));
                showNotification('🗑 Задание удалено');
            }
        };
    </script>
</body>
</html>
